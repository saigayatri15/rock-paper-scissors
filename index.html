<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(25, 25, 25);
            color: whitesmoke;
            padding: 20px;
            text-align: center;
        }
        .heading{
            font-size: x-large;
            font-weight: bold;
        }
        .subheading{
            font-style: italic;
            font-size: medium;
        }
        .moves{
            font-size: medium;
        }
        .result{
            font-size: large;
            font-weight: bold;
            font-style: italic;
        }
        .score{
            font-size: medium;
        }
        .reset-btn{
            background-color: whitesmoke;
            color: black;
            padding: 8px 16px;
            border: none;
            font-weight: bold;
        }
        .mbtn{
            width: 120px;
            height: 120px;
            padding: 30px;
            border: 1px solid whitesmoke;
            border-radius: 60px;
            background: transparent;
            cursor: pointer;
            margin-right: 10px;
            text-align: center;
        }
        .move{
            width: 50px;
        }
    </style>
</head>
<body>
    <p class="heading">Rock Paper Scissors</p>
    <p class="subheading">Choose your move:</p>
    <button class="mbtn" id="rock" onclick="play(event)"><img class="move" src="emoji/rock-emoji.png"></button>
    <button class="mbtn" id="paper" onclick="play(event)"><img class="move" src="emoji/paper-emoji.png"></button>
    <button class="mbtn" id="scissors" onclick="play(event)"><img class="move" src="emoji/scissors-emoji.png"></button>
    <p class="moves"></p>
    <p class="result"></p>
    <p class="score"></p>
    <button class="reset-btn" onclick="resetScore()">Reset Score</button>

    <script>
        let score = JSON.parse(localStorage.getItem('score'));
        if(!score){
            score = {
                wins: 0,
                losses: 0,
                ties: 0
            }
        }
        updateScores();

        function generateComputerMove(){
            let randomNum = Math.floor(Math.random()*(4-1))+1;
            if(randomNum===1){
                return 'rock';
            }
            else if(randomNum===2){
                return 'paper';
            }
            else if(randomNum===3){
                return 'scissors';
            }
        }
        function play(event){

            let playerMove = event.currentTarget.id;
            let computerMove = generateComputerMove();

            let result;
            if(playerMove === 'rock'){
                if(computerMove==='rock') {
                    result = 'Tie';
                    score.ties += 1;
                }
                else if(computerMove==='paper') {
                    result = 'You lose';
                    score.losses += 1;
                }
                else if(computerMove==='scissors') {
                    result = 'You win';
                    score.wins += 1
                }
            }
            else if(playerMove === 'paper'){
                if(computerMove==='rock') {
                    result = 'You win';
                    score.wins += 1
                }
                else if(computerMove==='paper') {
                    result = 'Tie';
                    score.ties += 1;
                }
                else if(computerMove==='scissors') {
                    result = 'You lose';
                    score.losses += 1;
                }
            }
            else if(playerMove === 'scissors'){
                if(computerMove==='rock') {
                    result = 'You lose';
                    score.losses += 1;
                }
                else if(computerMove==='paper') {
                    result = 'You win';
                    score.wins += 1
                }
                else if(computerMove==='scissors') {
                    result = 'Tie';
                    score.ties += 1;
                }
            }

            localStorage.setItem('score',JSON.stringify(score));
            const moves = document.querySelector('.moves');
            const res = document.querySelector('.result');
            const scores = document.querySelector('.score');
            moves.innerHTML = `You <img class="move" src="emoji/${playerMove}-emoji.png">  <img class="move" src="emoji/${computerMove}-emoji.png"> Computer`;
            res.innerText = result;
            updateScores();
        }
        function updateScores(){
            document.querySelector('.score').innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
            if(score.wins||score.losses||score.ties){
                document.querySelector('.reset-btn').style.opacity = 1;
            }
            else{
                document.querySelector('.reset-btn').style.opacity = 0;
            }
        }
        function resetScore(){
            score.wins = 0;
            score.ties = 0;
            score.losses = 0;
            updateScores();
            localStorage.removeItem('score');
        }
    </script>
</body>
</html>
